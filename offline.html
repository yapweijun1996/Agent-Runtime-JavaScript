<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ee7a2f" />
    <title>Offline — agrun.js</title>
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: oklch(98.8% 0.008 70);
        --surface: oklch(100% 0 0);
        --text: oklch(22% 0.025 50);
        --muted: oklch(48% 0.025 55);
        --accent: oklch(70% 0.185 45);
        --border: oklch(90% 0.020 60);
        font-family: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: oklch(16% 0.015 50);
          --surface: oklch(20% 0.018 50);
          --text: oklch(96% 0.012 70);
          --muted: oklch(72% 0.020 60);
          --accent: oklch(75% 0.155 48);
          --border: oklch(30% 0.025 50);
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        max-width: 480px;
        width: 100%;
        text-align: center;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 22px;
        padding: 44px 32px;
        box-shadow: 0 20px 60px oklch(40% 0.05 50 / 0.08);
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        border-radius: 999px;
        background: oklch(95% 0.035 60);
        color: oklch(44% 0.140 38);
        font-size: 0.82rem;
        font-weight: 600;
        margin-bottom: 20px;
      }
      @media (prefers-color-scheme: dark) {
        .badge { background: oklch(28% 0.080 45); color: oklch(96% 0.020 70); }
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.8rem;
        letter-spacing: -0.02em;
        font-weight: 700;
      }
      p {
        margin: 0 0 28px;
        color: var(--muted);
        line-height: 1.6;
      }
      a.button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 22px;
        border-radius: 999px;
        background: var(--accent);
        color: oklch(99% 0.005 60);
        font-weight: 600;
        text-decoration: none;
        border: none;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <span class="badge">Offline</span>
      <h1>You're not connected</h1>
      <p>agrun.js works in your browser, but we couldn't reach the network to load this page. Check your connection and try again.</p>
      <a class="button" href="/" onclick="event.preventDefault(); location.reload();">Retry</a>
    </div>
  </body>
</html>
