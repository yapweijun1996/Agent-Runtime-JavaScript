<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale=1/user-scalable=no gives native-app pinch/double-tap-zoom
         behavior when installed as a PWA (standalone display mode honors this
         reliably; a regular mobile browser tab may still allow zoom, which is
         why the touch-action CSS fallback in index.css exists too). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script>
      (() => {
        const SETTINGS_KEY = 'agrun.browser.settings.v1';
        const root = document.documentElement;
        let theme = 'system';

        try {
          const parsed = JSON.parse(window.localStorage.getItem(SETTINGS_KEY) || 'null');
          if (parsed?.theme === 'dark' || parsed?.theme === 'light' || parsed?.theme === 'system') {
            theme = parsed.theme;
          }
        } catch {}

        root.dataset.theme = theme === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : theme;
      })();
    </script>
    <!-- Relative hrefs (no leading /) so these resolve correctly whether the
         built dist/ is served from a domain root or a subpath — see
         `base: './'` in vite.config.ts. -->
