<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111318" />
    <title>agrun Long Task Lab offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #111318;
        color: #eef2f7;
      }
      body {
        display: grid;
        min-height: 100dvh;
        margin: 0;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(100%, 560px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        background: #151922;
        padding: 24px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.35rem;
      }
      p {
        margin: 0;
        color: #a7b1c2;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Long Task Lab is offline</h1>
      <p>The installed shell can open again when the network returns. Existing records are stored in this browser's IndexedDB, but starting a new AI run needs network access.</p>
    </main>
  </body>
</html>
